[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}({{ commit.scope }}) {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = true
commit_parsers = [
  { message = "(?i)^feat", group = "New Features" },
  { message = "(?i)^fix", group = "Bug Fixes" },
  { message = "(?i)^refactor", group = "Improvements" },
  { message = "(?i)^perf", group = "Improvements" },
  { message = "(?i)^chore: Change version", skip = true },
  { message = "(?i)^chore", group = "Other Changes" },
  { message = "(?i)^docs", group = "Documentation" },
  { message = "(?i)^style", skip = true },
  { message = "(?i)^test", skip = true },
  { message = "(?i)^ci", skip = true },
  { message = "(?i)^add", group = "New Features" },
]
filter_commits = true
tag_pattern = "v?[0-9]+\\.[0-9]+.*"
topo_order = false
sort_commits = "oldest"
